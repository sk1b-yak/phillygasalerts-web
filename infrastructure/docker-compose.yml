services:
  timescaledb:
    image: timescale/timescaledb:2.17.0-pg15
    container_name: philly_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=PhillyGas2026!
      - POSTGRES_DB=phillygasalerts
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phillygasalerts"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.23.2
    container_name: philly_redis
    restart: always
    ulimits:
      memlock: -1
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - dragonfly_data:/data
    healthcheck:
      test: ["CMD", "dragonfly-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  timescaledb_data:
  dragonfly_data:
